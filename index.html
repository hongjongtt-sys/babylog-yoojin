<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>우리아기 육아일지</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#faf7f5; --card:#ffffff; --ink:#3a3230; --sub:#8a7f7b;
    --line:#eee3df; --accent:#e8998d; --accent-soft:#fbe4df;
    --feed:#7fb3d5; --diaper:#c9a96e; --sleep:#a58fc9; --med:#e0776b;
    --danger:#e0776b; --radius:16px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:var(--bg);color:var(--ink);}
  #app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:78px;position:relative;}

  /* login */
  #loginScreen{display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh;padding:24px;gap:14px;}
  #loginScreen h1{font-size:22px;margin-bottom:4px;}
  #loginScreen input{width:100%;max-width:300px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;font-size:15px;}
  #loginScreen button{width:100%;max-width:300px;padding:13px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:15px;font-weight:600;}
  #loginErr{color:var(--danger);font-size:13px;min-height:16px;}
  #loginToggle{font-size:13px;color:var(--sub);text-decoration:underline;background:none;border:none;padding:0;max-width:none;width:auto;font-weight:400;}

  header.topbar{position:sticky;top:0;background:var(--bg);z-index:5;padding:14px 16px 8px;display:flex;align-items:center;justify-content:space-between;}
  header.topbar h2{font-size:17px;margin:0;}
  header.topbar .logout{font-size:12px;color:var(--sub);background:none;border:none;text-decoration:underline;}

  .page{padding:0 16px 16px;display:none;}
  .page.active{display:block;}

  .card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .card h3{margin:0 0 10px;font-size:14px;color:var(--sub);font-weight:600;}

  /* dashboard */
  .summaryRow{display:flex;gap:10px;margin-bottom:12px;}
  .summaryBox{flex:1;background:var(--card);border-radius:14px;padding:14px 10px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .summaryBox .num{font-size:20px;font-weight:700;}
  .summaryBox .lbl{font-size:11px;color:var(--sub);margin-top:2px;}
  canvas{max-width:100%;}

  /* quick add buttons */
  .quickRow{display:flex;gap:8px;margin-bottom:14px;}
  .quickBtn{flex:1;border:none;border-radius:14px;padding:14px 6px;font-size:13px;font-weight:600;color:#fff;display:flex;flex-direction:column;align-items:center;gap:4px;}
  .quickBtn.feed{background:var(--feed);}
  .quickBtn.diaper{background:var(--diaper);}
  .quickBtn.sleep{background:var(--sleep);}
  .quickBtn .ic{font-size:20px;}
  .quickBtn.active{outline:3px solid rgba(0,0,0,.15);}

  /* date nav */
  .dateNav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .dateNav button{background:var(--card);border:1px solid var(--line);border-radius:10px;width:38px;height:38px;font-size:16px;}
  .dateNav .dLabel{font-size:16px;font-weight:700;}
  .dateNav .today-jump{font-size:12px;color:var(--accent);background:none;border:none;text-decoration:underline;width:auto;height:auto;}

  /* timeline */
  .tlItem{display:flex;gap:10px;align-items:flex-start;padding:10px 4px;border-bottom:1px solid var(--line);}
  .tlItem:last-child{border-bottom:none;}
  .tlDot{width:10px;height:10px;border-radius:50%;margin-top:5px;flex-shrink:0;}
  .tlDot.feed{background:var(--feed);} .tlDot.diaper{background:var(--diaper);} .tlDot.sleep{background:var(--sleep);} .tlDot.med{background:var(--med);}
  .tlBody{flex:1;}
  .tlTime{font-size:12px;color:var(--sub);}
  .tlMain{font-size:14.5px;font-weight:600;margin-top:1px;}
  .tlSub{font-size:12.5px;color:var(--sub);margin-top:1px;}
  .emptyMsg{text-align:center;color:var(--sub);font-size:13px;padding:26px 0;}

  /* bottom sheet */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:30;display:none;}
  .overlay.show{display:block;}
  .sheet{position:fixed;left:0;right:0;bottom:0;background:#fff;z-index:31;border-radius:20px 20px 0 0;padding:20px 18px 24px;max-width:480px;margin:0 auto;transform:translateY(100%);transition:transform .25s ease;max-height:85vh;overflow-y:auto;}
  .sheet.show{transform:translateY(0);}
  .sheet h3{margin:0 0 14px;font-size:17px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;color:var(--sub);margin-bottom:5px;}
  .field input, .field select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:#fdfbfa;}
  .segRow{display:flex;gap:8px;}
  .segBtn{flex:1;padding:11px;border-radius:10px;border:1px solid var(--line);background:#fdfbfa;font-size:14px;font-weight:600;}
  .segBtn.sel{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}
  .sheetBtns{display:flex;gap:8px;margin-top:6px;}
  .sheetBtns button{flex:1;padding:13px;border-radius:12px;border:none;font-size:15px;font-weight:600;}
  .btnSave{background:var(--accent);color:#fff;}
  .btnDelete{background:#f4e9e7;color:var(--danger);}
  .btnCancel{background:#f0ecea;color:var(--ink);}

  /* calendar */
  .calGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center;}
  .calGrid .dow{font-size:11px;color:var(--sub);padding-bottom:4px;}
  .calCell{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;position:relative;background:#fdfbfa;cursor:pointer;}
  .calCell.empty{background:none;}
  .calCell.today{border:1.5px solid var(--accent);font-weight:700;}
  .calCell.sel{background:var(--accent-soft);}
  .dotsWrap{display:flex;gap:2px;margin-top:3px;}
  .dotsWrap span{width:5px;height:5px;border-radius:50%;}
  .calNav{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .calNav button{background:none;border:none;font-size:17px;color:var(--ink);}
  .calNav .mLabel{font-weight:700;font-size:15.5px;}

  /* medication */
  .medAddBtn{width:100%;padding:13px;border:none;border-radius:12px;background:var(--med);color:#fff;font-weight:700;font-size:14.5px;margin-bottom:14px;}

  /* vaccination */
  .vGroup{margin-bottom:6px;}
  .vRow{display:flex;align-items:center;justify-content:space-between;padding:11px 4px;border-bottom:1px solid var(--line);}
  .vRow:last-child{border-bottom:none;}
  .vName{font-size:14px;font-weight:600;}
  .vAge{font-size:11.5px;color:var(--sub);}
  .vStatus{font-size:12px;padding:5px 10px;border-radius:20px;font-weight:600;}
  .vStatus.done{background:#e3f3e6;color:#3e8e52;}
  .vStatus.pending{background:#f3ede3;color:#9a7f4a;}

  /* bottom nav */
  nav.tabbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;max-width:480px;margin:0 auto;z-index:10;}
  nav.tabbar button{flex:1;background:none;border:none;padding:9px 0 8px;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--sub);font-size:10.5px;}
  nav.tabbar button.on{color:var(--accent);font-weight:700;}
  nav.tabbar .tIcon{font-size:19px;}
</style>
</head>
<body>

<div id="loginScreen">
  <h1>🍼 우리아기 육아일지</h1>
  <p style="color:var(--sub);font-size:13px;margin-top:-8px;">가족 계정으로 로그인하세요</p>
  <input id="loginEmail" type="email" placeholder="이메일">
  <input id="loginPw" type="password" placeholder="비밀번호">
  <button id="loginBtn">로그인</button>
  <button id="signupBtn" style="background:#f0ecea;color:var(--ink);">계정 만들기</button>
  <div id="loginErr"></div>
</div>

<div id="app" style="display:none;">
  <header class="topbar">
    <h2>🍼 유진이 육아일지</h2>
    <button class="logout" id="logoutBtn">로그아웃</button>
  </header>

  <!-- 대시보드 -->
  <section class="page" id="page-dashboard">
    <div class="summaryRow">
      <div class="summaryBox"><div class="num" id="sumFeed">0ml</div><div class="lbl">오늘 수유량</div></div>
      <div class="summaryBox"><div class="num" id="sumSleep">0h</div><div class="lbl">오늘 수면시간</div></div>
      <div class="summaryBox"><div class="num" id="sumDiaper">0회</div><div class="lbl">오늘 배변</div></div>
    </div>
    <div class="card">
      <h3>최근 7일 수유량 (ml)</h3>
      <canvas id="feedChart" height="160"></canvas>
    </div>
    <div class="card">
      <h3>최근 7일 수면시간 (시간)</h3>
      <canvas id="sleepChart" height="160"></canvas>
    </div>
  </section>

  <!-- 캘린더 -->
  <section class="page" id="page-calendar">
    <div class="card">
      <div class="calNav">
        <button id="calPrev">‹</button>
        <div class="mLabel" id="calMonthLabel"></div>
        <button id="calNext">›</button>
      </div>
      <div class="calGrid" id="calGrid"></div>
    </div>
    <div class="card">
      <div class="dateNav" style="margin-bottom:6px;">
        <div class="dLabel" id="calSelLabel">-</div>
      </div>
      <div id="calDayList"></div>
    </div>
  </section>

  <!-- 통합기록 -->
  <section class="page" id="page-record">
    <div class="dateNav">
      <button id="recPrev">‹</button>
      <div style="text-align:center;">
        <div class="dLabel" id="recDateLabel">오늘</div>
        <button class="today-jump" id="recTodayJump">오늘로</button>
      </div>
      <button id="recNext">›</button>
    </div>
    <div class="quickRow">
      <button class="quickBtn feed" id="qbFeed"><span class="ic">🍼</span>수유</button>
      <button class="quickBtn diaper" id="qbDiaper"><span class="ic">💩</span>배변</button>
      <button class="quickBtn sleep" id="qbSleep"><span class="ic">😴</span>수면</button>
    </div>
    <div class="card">
      <h3 style="margin-bottom:4px;">타임라인</h3>
      <div id="recTimeline"></div>
    </div>
  </section>

  <!-- 투약 -->
  <section class="page" id="page-med">
    <div class="dateNav">
      <button id="medPrev">‹</button>
      <div style="text-align:center;">
        <div class="dLabel" id="medDateLabel">오늘</div>
        <button class="today-jump" id="medTodayJump">오늘로</button>
      </div>
      <button id="medNext">›</button>
    </div>
    <button class="medAddBtn" id="medAddBtn">+ 투약 기록 추가</button>
    <div class="card">
      <h3 style="margin-bottom:4px;">투약 내역</h3>
      <div id="medTimeline"></div>
    </div>
  </section>

  <!-- 접종 -->
  <section class="page" id="page-vax">
    <div class="card" id="vaxList"></div>
  </section>

  <nav class="tabbar">
    <button data-page="dashboard" class="on"><span class="tIcon">📊</span>대시보드</button>
    <button data-page="calendar"><span class="tIcon">📅</span>캘린더</button>
    <button data-page="record"><span class="tIcon">📝</span>기록</button>
    <button data-page="med"><span class="tIcon">💊</span>투약</button>
    <button data-page="vax"><span class="tIcon">💉</span>접종</button>
  </nav>
</div>

<div class="overlay" id="overlay"></div>

<!-- 수유 입력 시트 -->
<div class="sheet" id="sheetFeed">
  <h3>🍼 수유 기록</h3>
  <div class="field"><label>시간</label><input type="time" id="feedTime"></div>
  <div class="field"><label>방법</label>
    <div class="segRow" id="feedMethodSeg">
      <button class="segBtn sel" data-v="모유">모유</button>
      <button class="segBtn" data-v="분유">분유</button>
      <button class="segBtn" data-v="혼합">혼합</button>
    </div>
  </div>
  <div class="field"><label>수유량 (ml)</label><input type="number" id="feedAmount" placeholder="예: 120"></div>
  <div class="sheetBtns">
    <button class="btnDelete" id="feedDeleteBtn" style="display:none;">삭제</button>
    <button class="btnCancel" id="feedCancelBtn">취소</button>
    <button class="btnSave" id="feedSaveBtn">저장</button>
  </div>
</div>

<!-- 배변 입력 시트 -->
<div class="sheet" id="sheetDiaper">
  <h3>💩 배변 기록</h3>
  <div class="field"><label>시간</label><input type="time" id="diaperTime"></div>
  <div class="field"><label>구분</label>
    <div class="segRow" id="diaperKindSeg">
      <button class="segBtn sel" data-v="소변">소변</button>
      <button class="segBtn" data-v="대변">대변</button>
      <button class="segBtn" data-v="둘다">둘다</button>
    </div>
  </div>
  <div class="field"><label>상태 메모 (선택)</label><input type="text" id="diaperNote" placeholder="예: 묽음, 색 진함 등"></div>
  <div class="sheetBtns">
    <button class="btnDelete" id="diaperDeleteBtn" style="display:none;">삭제</button>
    <button class="btnCancel" id="diaperCancelBtn">취소</button>
    <button class="btnSave" id="diaperSaveBtn">저장</button>
  </div>
</div>

<!-- 수면 입력 시트 -->
<div class="sheet" id="sheetSleep">
  <h3>😴 수면 기록</h3>
  <div class="field"><label>시작 시간</label><input type="time" id="sleepStart"></div>
  <div class="field"><label>종료 시간 (모르면 비워두세요)</label><input type="time" id="sleepEnd"></div>
  <div class="sheetBtns">
    <button class="btnDelete" id="sleepDeleteBtn" style="display:none;">삭제</button>
    <button class="btnCancel" id="sleepCancelBtn">취소</button>
    <button class="btnSave" id="sleepSaveBtn">저장</button>
  </div>
</div>

<!-- 투약 입력 시트 -->
<div class="sheet" id="sheetMed">
  <h3>💊 투약 기록</h3>
  <div class="field"><label>시간</label><input type="time" id="medTime"></div>
  <div class="field"><label>약품명</label><input type="text" id="medName" placeholder="예: 타이레놀 시럽"></div>
  <div class="field"><label>용량</label><input type="text" id="medDose" placeholder="예: 3ml"></div>
  <div class="field"><label>메모 (선택)</label><input type="text" id="medNote" placeholder="예: 발열 38.5도"></div>
  <div class="sheetBtns">
    <button class="btnDelete" id="medDeleteBtn" style="display:none;">삭제</button>
    <button class="btnCancel" id="medCancelBtn">취소</button>
    <button class="btnSave" id="medSaveBtn">저장</button>
  </div>
</div>

<!-- 접종 입력 시트 -->
<div class="sheet" id="sheetVax">
  <h3 id="vaxSheetTitle">💉 접종 기록</h3>
  <div class="field"><label>접종일</label><input type="date" id="vaxDate"></div>
  <div class="field"><label>병원 (선택)</label><input type="text" id="vaxHospital"></div>
  <div class="field"><label>이상반응 메모 (선택)</label><input type="text" id="vaxNote"></div>
  <div class="sheetBtns">
    <button class="btnDelete" id="vaxDeleteBtn" style="display:none;">삭제</button>
    <button class="btnCancel" id="vaxCancelBtn">취소</button>
    <button class="btnSave" id="vaxSaveBtn">저장</button>
  </div>
</div>

<script>
/* =========================================================
   ⚠️ Firebase 설정: 아래 값을 본인의 Firebase 프로젝트 값으로 교체하세요.
   Firebase 콘솔 > 프로젝트 설정 > 일반 > 내 앱 에서 확인 가능
   ========================================================= */
constfirebaseConfig ={
apiKey:"AIzaSyBeO6jcUE76JZnTgBZ-58en8MO6yQlHBKc",
authDomain:"babylog-yoojin.firebaseapp.com",
projectId:"babylog-yoojin",
storageBucket:"babylog-yoojin.firebasestorage.app",
messagingSenderId:"472624237586",
appId:"1:472624237586:web:9eb7ddaa360ad48b2cdccb"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const CHILD_ID = "yoojin"; // 아이가 늘어나면 childId만 바꿔서 재사용

/* ---------- 유틸 ---------- */
function pad(n){return n.toString().padStart(2,'0');}
function toDateStr(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function toTimeStr(d){return `${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function parseDateStr(s){const [y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function fmtDateLabel(d){
  const today = new Date(); today.setHours(0,0,0,0);
  const cmp = new Date(d); cmp.setHours(0,0,0,0);
  const diff = Math.round((cmp-today)/86400000);
  const base = `${d.getMonth()+1}월 ${d.getDate()}일`;
  if(diff===0) return `오늘 (${base})`;
  if(diff===-1) return `어제 (${base})`;
  if(diff===1) return `내일 (${base})`;
  return base;
}

/* ---------- 로그인 ---------- */
document.getElementById('loginBtn').onclick = ()=>{
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPw').value;
  auth.signInWithEmailAndPassword(email,pw).catch(e=>{
    document.getElementById('loginErr').textContent = '로그인 실패: '+e.message;
  });
};
document.getElementById('signupBtn').onclick = ()=>{
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPw').value;
  auth.createUserWithEmailAndPassword(email,pw).catch(e=>{
    document.getElementById('loginErr').textContent = '가입 실패: '+e.message;
  });
};
document.getElementById('logoutBtn').onclick = ()=> auth.signOut();

let allRecords = []; // 전체 records 캐시 (수유/배변/수면)
let allMeds = [];
let vaxRecords = {}; // vaccineId_doseIdx -> {date, hospital, note}

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='block';
    startListeners();
  }else{
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('app').style.display='none';
  }
});

function startListeners(){
  db.collection('records').where('childId','==',CHILD_ID).orderBy('dateTime','asc')
    .onSnapshot(snap=>{
      allRecords = [];
      allMeds = [];
      snap.forEach(doc=>{
        const d = {id:doc.id, ...doc.data()};
        if(d.type==='med') allMeds.push(d); else allRecords.push(d);
      });
      renderAll();
    });
  db.collection('vaccinations').where('childId','==',CHILD_ID)
    .onSnapshot(snap=>{
      vaxRecords = {};
      snap.forEach(doc=>{ vaxRecords[doc.id.replace(CHILD_ID+'_','')] = {docId:doc.id, ...doc.data()}; });
      renderVax();
    });
}

function renderAll(){
  renderDashboard();
  renderCalendar();
  renderRecordTab();
  renderMedTab();
}

/* ---------- 탭 전환 ---------- */
document.querySelectorAll('nav.tabbar button').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('nav.tabbar button').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('page-'+btn.dataset.page).classList.add('active');
  };
});

/* ---------- 대시보드 ---------- */
let feedChartObj=null, sleepChartObj=null;
function renderDashboard(){
  const todayStr = toDateStr(new Date());
  const todayRecs = allRecords.filter(r=>r.date===todayStr);
  const feedTotal = todayRecs.filter(r=>r.type==='feed').reduce((s,r)=>s+(Number(r.amount)||0),0);
  const diaperCount = todayRecs.filter(r=>r.type==='diaper').length;
  const sleepMinutes = todayRecs.filter(r=>r.type==='sleep').reduce((s,r)=>{
    if(!r.endTime) return s;
    return s + minutesBetween(r.startTime,r.endTime);
  },0);
  document.getElementById('sumFeed').textContent = feedTotal+'ml';
  document.getElementById('sumDiaper').textContent = diaperCount+'회';
  document.getElementById('sumSleep').textContent = (sleepMinutes/60).toFixed(1)+'h';

  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    days.push(toDateStr(d));
  }
  const feedData = days.map(ds=>allRecords.filter(r=>r.date===ds&&r.type==='feed').reduce((s,r)=>s+(Number(r.amount)||0),0));
  const sleepData = days.map(ds=>allRecords.filter(r=>r.date===ds&&r.type==='sleep').reduce((s,r)=>r.endTime? s+minutesBetween(r.startTime,r.endTime)/60 : s,0));
  const labels = days.map(ds=>{const d=parseDateStr(ds);return `${d.getMonth()+1}/${d.getDate()}`;});

  if(feedChartObj) feedChartObj.destroy();
  feedChartObj = new Chart(document.getElementById('feedChart'), {
    type:'bar',
    data:{labels, datasets:[{data:feedData, backgroundColor:'#7fb3d5', borderRadius:6}]},
    options:{plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}}}
  });
  if(sleepChartObj) sleepChartObj.destroy();
  sleepChartObj = new Chart(document.getElementById('sleepChart'), {
    type:'bar',
    data:{labels, datasets:[{data:sleepData.map(v=>Number(v.toFixed(1))), backgroundColor:'#a58fc9', borderRadius:6}]},
    options:{plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}}}
  });
}
function minutesBetween(t1,t2){
  const [h1,m1]=t1.split(':').map(Number), [h2,m2]=t2.split(':').map(Number);
  let mins = (h2*60+m2)-(h1*60+m1);
  if(mins<0) mins+=24*60;
  return mins;
}

  if(items.length===0){ wrap.innerHTML='<div class="emptyMsg">이 날 기록이 없어요.</div>'; return; }
  wrap.innerHTML = items.map(r=>renderTlItem(r)).join('');
  wrap.querySelectorAll('.tlItem').forEach(el=>{

  });

function getSortTime(r){
  if(r.type==='sleep') return r.startTime||'00:00';
  return r.time||'00:00';
}
function renderTlItem(r){
  let main='', sub='';
  if(r.type==='feed'){ main = `🍼 수유 ${r.amount?r.amount+'ml':''}`; sub = r.method||''; }
  else if(r.type==='diaper'){ main = `💩 배변 (${r.kind})`; sub = r.note||''; }
  else if(r.type==='sleep'){ main = `😴 수면 ${r.startTime}${r.endTime?' ~ '+r.endTime:' (진행중)'}`; sub = r.endTime?minutesBetween(r.startTime,r.endTime)+'분':''; }
  const timeLabel = r.type==='sleep' ? r.startTime : r.time;
  return `<div class="tlItem" data-id="${r.id}" data-type="${r.type}">
    <div class="tlDot ${r.type}"></div>
    <div class="tlBody">
      <div class="tlTime">${timeLabel}</div>
      <div class="tlMain">${main}</div>
      ${sub?`<div class="tlSub">${sub}</div>`:''}
    </div>
  </div>`;
}

function openEditSheet(id, type){

function setSeg(groupId, val){

document.querySelectorAll('.segRow').forEach(row=>{

function getSegVal(groupId){

function showSheet(id){

function hideAllSheets(){

/* ---------- 캘린더 탭 ---------- */
let calMonth = new Date(); calMonth.setDate(1);
let calSelDate = new Date();
function renderCalendar(){
  document.getElementById('calMonthLabel').textContent = `${calMonth.getFullYear()}년 ${calMonth.getMonth()+1}월`;
  const grid = document.getElementById('calGrid');
  const dows=['일','월','화','수','목','금','토'];
  let html = dows.map(d=>`<div class="dow">${d}</div>`).join('');
  const firstDow = new Date(calMonth.getFullYear(), calMonth.getMonth(), 1).getDay();
  const daysInMonth = new Date(calMonth.getFullYear(), calMonth.getMonth()+1, 0).getDate();
  for(let i=0;i<firstDow;i++) html += `<div class="calCell empty"></div>`;
  const todayStr = toDateStr(new Date());
  for(let day=1; day<=daysInMonth; day++){
    const d = new Date(calMonth.getFullYear(), calMonth.getMonth(), day);
    const ds = toDateStr(d);
    const dayRecs = allRecords.filter(r=>r.date===ds);
    const dayMeds = allMeds.filter(r=>r.date===ds);
    const types = new Set(dayRecs.map(r=>r.type));
    if(dayMeds.length) types.add('med');
    const dots = [...types].map(t=>`<span style="background:var(--${t})"></span>`).join('');
    const cls = ['calCell'];
    if(ds===todayStr) cls.push('today');
    if(ds===toDateStr(calSelDate)) cls.push('sel');
    html += `<div class="${cls.join(' ')}" data-date="${ds}">${day}<div class="dotsWrap">${dots}</div></div>`;
  }
  grid.innerHTML = html;
  grid.querySelectorAll('.calCell[data-date]').forEach(el=>{
    el.onclick=()=>{ calSelDate = parseDateStr(el.dataset.date); renderCalendar(); renderCalDayList(); };
  });
  renderCalDayList();
}
function renderCalDayList(){
  document.getElementById('calSelLabel').textContent = fmtDateLabel(calSelDate);
  const ds = toDateStr(calSelDate);
  const items = [...allRecords.filter(r=>r.date===ds), ...allMeds.filter(r=>r.date===ds)]
    .sort((a,b)=>getSortTime(a).localeCompare(getSortTime(b)));
  const wrap = document.getElementById('calDayList');
  if(items.length===0){ wrap.innerHTML='<div class="emptyMsg">이 날 기록이 없어요.</div>'; return; }
  wrap.innerHTML = items.map(r=> r.type==='med'
    ? `<div class="tlItem" data-id="${r.id}" data-type="med"><div class="tlDot med"></div><div class="tlBody"><div class="tlTime">${r.time}</div><div class="tlMain">💊 ${r.name} ${r.dose?'('+r.dose+')':''}</div>${r.note?`<div class="tlSub">${r.note}</div>`:''}</div></div>`
    : renderTlItem(r)
  ).join('');
  wrap.querySelectorAll('.tlItem').forEach(el=>{
    el.onclick=()=>openEditSheet(el.dataset.id, el.dataset.type);
  });
}
document.getElementById('calPrev').onclick=()=>{calMonth.setMonth(calMonth.getMonth()-1); renderCalendar();};
document.getElementById('calNext').onclick=()=>{calMonth.setMonth(calMonth.getMonth()+1); renderCalendar();};

function renderVax(){
  const wrap = document.getElementById('vaxList');
  wrap.innerHTML = VAX_DEFS.map(v=>{
    const rows = v.doses.map((dose,i)=>{
      const key = `${v.id}_${i}`;
      const rec = vaxRecords[key];
      const status = rec ? `<span class="vStatus done">완료 ${rec.date}</span>` : `<span class="vStatus pending">예정</span>`;
      return `<div class="vRow" data-key="${key}" data-vname="${v.name}" data-dlabel="${dose.label}">
        <div><div class="vName">${v.name} ${dose.label}</div><div class="vAge">${dose.age}</div></div>
        ${status}
      </div>`;
    }).join('');
    return `<div class="vGroup">${rows}</div>`;
  }).join('');
  wrap.querySelectorAll('.vRow').forEach(el=>{
    el.onclick=()=>openVaxSheet(el.dataset.key, el.dataset.vname, el.dataset.dlabel);
  });
}
let vaxEditKey=null;
function openVaxSheet(key, vname, dlabel){
  vaxEditKey = key;
  document.getElementById('vaxSheetTitle').textContent = `💉 ${vname} ${dlabel}`;
  const rec = vaxRecords[key];
  document.getElementById('vaxDate').value = rec? rec.date : toDateStr(new Date());
  document.getElementById('vaxHospital').value = rec? (rec.hospital||'') : '';
  document.getElementById('vaxNote').value = rec? (rec.note||'') : '';
  document.getElementById('vaxDeleteBtn').style.display = rec? 'block':'none';
  showSheet('sheetVax');
}

document.getElementById('vaxDeleteBtn').onclick = async ()=>{
